<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sidebar</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(180deg, rgba(40,85,100,0.95) 0%, rgba(35,75,90,0.98) 100%);
      color: #cce8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 22px 0;
      overflow: hidden;
    }

    .section-label {
      font-size: 0.65rem;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: rgba(180,220,235,0.45);
      padding: 16px 20px 5px;
    }

    nav a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      color: rgba(204,232,240,0.85);
      text-decoration: none;
      font-size: 0.88rem;
      border-left: 3px solid transparent;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }

    nav a:hover {
      background: rgba(255,255,255,0.07);
      color: #fff;
      border-left-color: rgba(125,212,232,0.6);
    }

    nav a.active {
      background: rgba(125,212,232,0.12);
      color: #9de4f4;
      border-left-color: #7dd4e8;
      font-weight: 600;
    }

    .nav-icon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      opacity: 0.7;
    }

    nav a:hover .nav-icon,
    nav a.active .nav-icon { opacity: 1; }

    .divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.07);
      margin: 8px 0;
    }

    .badge-count {
      margin-left: auto;
      background: #7dd4e8;
      color: #1e3d50;
      border-radius: 10px;
      font-size: 0.68rem;
      padding: 2px 8px;
      font-weight: 700;
    }

    .bottom { margin-top: auto; }

    nav a.signout:hover {
      background: rgba(220,80,80,0.12);
      color: #f4a0a0;
      border-left-color: #f4a0a0;
    }
  </style>
</head>
<body>

  <div class="section-label">Overview</div>
  <nav>
    <a href="dash_home.html" target="main" class="active">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Dashboard
    </a>
    <a href="browse_jobs.html" target="main">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/></svg>
      Browse Jobs
    </a>
    <a href="dash_myjobs.html" target="main">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      My Jobs
    </a>
  </nav>

  <div class="section-label">Services</div>
  <nav>
    <a href="dash_workers.html" target="main">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
      Find Workers
    </a>
    <a href="dash_post.html" target="main">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      Post a Job
    </a>
    <a href="dash_messages.html" target="main">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      Messages
      <span class="badge-count">3</span>
    </a>
  </nav>

  <hr class="divider">

  <div class="section-label">Account</div>
  <nav>
    <a href="dash_profile.html" target="main">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      My Profile
    </a>
    <a href="dash_settings.html" target="main">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      Settings
    </a>
  </nav>

  <div class="bottom">
    <hr class="divider">
    <nav>
      <a href="index.html" class="signout">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign Out
      </a>
    </nav>
  </div>

</body>
</html>
