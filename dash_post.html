<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Post a Job</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #4a8a8a, #47798d);
      color: #fff;
      padding: 30px;
      min-height: 100vh;
      overflow-y: auto;
    }

    h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 5px; }
    .subtitle { color: rgba(255,255,255,0.6); font-size: 0.9rem; margin-bottom: 28px; }

    .form-box {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 14px;
      padding: 28px;
      max-width: 540px;
    }

    .form-group { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: rgba(255,255,255,0.55);
      margin-bottom: 6px;
    }

    input[type="text"], select, textarea {
      width: 100%;
      padding: 10px 14px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      color: #fff;
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.35); }

    input:focus, select:focus, textarea:focus {
      border-color: rgba(125,212,232,0.7);
      background: rgba(255,255,255,0.14);
    }

    select option { background: #2a5a70; color: #fff; }
    textarea { resize: vertical; min-height: 95px; }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    .btn-submit {
      width: 100%;
      padding: 12px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 8px;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.3s;
      margin-top: 8px;
    }

    .btn-submit:hover { background: rgba(255,255,255,0.22); }

    .success-msg {
      display: none;
      background: rgba(80,200,120,0.15);
      border: 1px solid rgba(80,200,120,0.35);
      border-radius: 8px;
      padding: 13px 16px;
      color: #80e0a0;
      margin-top: 14px;
      font-size: 0.88rem;
    }
  </style>
</head>
<body>

  <h2>Post a New Job</h2>
  <p class="subtitle">Fill in the details — workers near you will see it immediately</p>

  <div class="form-box">
    <div class="form-group">
      <label>Job Title</label>
      <input type="text" placeholder="e.g. Fix kitchen sink" id="jobTitle">
    </div>
    <div class="row">
      <div class="form-group">
        <label>Category</label>
        <select id="category">
          <option value="">Select...</option>
          <option>Plumber</option>
          <option>Mechanic</option>
          <option>Electrician</option>
          <option>Cleaner</option>
          <option>Constructor</option>
          <option>Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Location</label>
        <input type="text" placeholder="e.g. Kimironko, Kigali" id="location">
      </div>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea placeholder="Describe the work, tools needed, urgency..." id="description"></textarea>
    </div>
    <div class="row">
      <div class="form-group">
        <label>Budget (RWF)</label>
        <input type="text" placeholder="e.g. 15,000" id="budget">
      </div>
      <div class="form-group">
        <label>When Needed</label>
        <input type="text" placeholder="e.g. Today, Tomorrow" id="timing">
      </div>
    </div>
    <div class="form-group">
      <label>Phone Number</label>
      <input type="text" placeholder="e.g. 078 000 0000" id="phone">
    </div>
    <button class="btn-submit" onclick="submitJob()">Post Job</button>
    <div class="success-msg" id="successMsg">
      Job posted successfully. Workers nearby will contact you soon.
    </div>
  </div>

  <script>
    function submitJob() {
      const title = document.getElementById('jobTitle').value;
      const cat   = document.getElementById('category').value;
      const loc   = document.getElementById('location').value;
      if (!title || !cat || !loc) {
        alert('Please fill in at least the title, category and location.');
        return;
      }
      document.getElementById('successMsg').style.display = 'block';
      const btn = document.querySelector('.btn-submit');
      btn.textContent = 'Posted';
      btn.style.background = 'rgba(80,200,120,0.2)';
      btn.style.borderColor = 'rgba(80,200,120,0.4)';
    }
  </script>
</body>
</html>
